<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSC Traffic Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --card: #12121a; --border: #1e1e2e;
            --text: #e5e7eb; --muted: #6b7280;
            --green: #10b981; --red: #ef4444; --blue: #3b82f6;
            --purple: #8b5cf6; --yellow: #f59e0b; --cyan: #06b6d4;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
        .header { background: linear-gradient(180deg, #16161f 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo:hover { opacity: 0.8; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--green), var(--cyan)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .header-right { display: flex; gap: 20px; align-items: center; font-size: 12px; color: var(--muted); }
        .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; display: inline-block; margin-right: 6px; }
        .stale-dot { width: 8px; height: 8px; background: var(--yellow); border-radius: 50%; display: inline-block; margin-right: 6px; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .main { padding: 20px 24px; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
        .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .stat-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .stat-icon { font-size: 24px; }
        .stat-change { font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px; }
        .stat-change.up { background: rgba(16,185,129,0.15); color: var(--green); }
        .stat-change.down { background: rgba(239,68,68,0.15); color: var(--red); }
        .stat-value { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
        .grid-wide { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 20px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .panel-body { padding: 20px; }
        .panel-body.flush { padding: 0; }
        .chart-box { height: 220px; }
        .chart-box.sm { height: 200px; }
        .chart-box.lg { height: 280px; }
        .legend { display: flex; gap: 16px; font-size: 11px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
        .search-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 12px; width: 220px; }
        .search-input:focus { outline: none; border-color: var(--blue); }
        .table-wrap { max-height: 500px; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); background: rgba(0,0,0,0.4); position: sticky; top: 0; cursor: pointer; user-select: none; }
        th:hover { color: var(--text); }
        th .sort-arrow { font-size: 9px; margin-left: 2px; }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border); }
        tr.clickable { cursor: pointer; }
        tr.clickable:hover { background: rgba(59,130,246,0.06); }
        tr:last-child td { border-bottom: none; }
        .site-cell { display: flex; align-items: center; gap: 12px; }
        .site-dot { width: 8px; height: 8px; border-radius: 50%; }
        .site-dot.good { background: var(--green); }
        .site-dot.warn { background: var(--yellow); }
        .site-dot.bad { background: var(--red); }
        .site-name { font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mono { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; }
        .trend { font-weight: 600; }
        .trend.up { color: var(--green); }
        .trend.down { color: var(--red); }
        .spark { width: 120px; height: 24px; }
        .toggle-btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
        .toggle-btn.active { background: color-mix(in srgb, var(--tc) 20%, transparent); color: var(--tc); border-color: color-mix(in srgb, var(--tc) 40%, transparent); }
        .toggle-btn:hover { border-color: var(--tc); }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; margin-bottom: 16px; transition: border-color 0.2s; }
        .back-btn:hover { border-color: var(--blue); }
        .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .detail-title { font-size: 22px; font-weight: 700; }
        .detail-badge { font-size: 12px; padding: 4px 12px; border-radius: 6px; font-weight: 600; }
        .detail-badge.up { background: rgba(16,185,129,0.15); color: var(--green); }
        .detail-badge.down { background: rgba(239,68,68,0.15); color: var(--red); }

        /* Main filter bar */
        .filter-bar { display:flex; gap:12px; padding:10px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; background:rgba(255,255,255,0.01); }
        .filter-group { display:flex; align-items:center; gap:5px; }
        .filter-label { font-size:11px; color:var(--muted); white-space:nowrap; margin-right:2px; }
        .filter-btn { padding:4px 12px; border-radius:5px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; white-space:nowrap; }
        .filter-btn.active { background:rgba(59,130,246,0.15); color:var(--blue); border-color:rgba(59,130,246,0.4); }
        .filter-btn:hover { border-color:var(--blue); color:var(--text); }

        /* Detail filter panel */
        .fp { background:rgba(255,255,255,0.015); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
        .fp-group { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
        .fp-label { font-size:11px; color:var(--muted); white-space:nowrap; }
        .fp-btn { padding:3px 10px; border-radius:5px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; white-space:nowrap; }
        .fp-btn:hover { border-color:var(--blue); }
        .fp-btn.active { background:rgba(59,130,246,0.15); color:var(--blue); border-color:rgba(59,130,246,0.4); }
        .fp-btn.g.active { background:rgba(16,185,129,0.15); color:var(--green); border-color:rgba(16,185,129,0.4); }
        .fp-btn.y.active { background:rgba(245,158,11,0.15); color:var(--yellow); border-color:rgba(245,158,11,0.4); }
        .fp-inp { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:3px 8px; border-radius:5px; font-size:11px; }
        .fp-inp:focus { outline:none; border-color:var(--blue); }
        .fp-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
        .fp-reset { padding:3px 10px; border-radius:5px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; }
        .fp-reset:hover { border-color:var(--red); color:var(--red); }
        .fp-count { font-size:11px; color:var(--muted); white-space:nowrap; }
        .export-btn { padding:4px 12px; border-radius:5px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; }
        .export-btn:hover { border-color:var(--green); color:var(--green); }

        /* Compare */
        .compare-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(120px); background:#1a1a2e; border:1px solid var(--blue); border-radius:12px; padding:12px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 8px 32px rgba(0,0,0,0.5); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:200; white-space:nowrap; }
        .compare-bar.visible { transform:translateX(-50%) translateY(0); }
        .compare-bar-btn { padding:7px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:opacity 0.2s; }
        .compare-bar-btn.primary { background:var(--blue); color:#fff; }
        .compare-bar-btn.secondary { background:transparent; border:1px solid var(--border); color:var(--muted); }
        .compare-bar-btn:hover { opacity:0.8; }
        .check-cell { width:36px !important; padding:0 10px !important; }
        .check-cell input[type=checkbox] { width:15px; height:15px; cursor:pointer; accent-color:var(--blue); }
        tr.selected-row { background:rgba(59,130,246,0.06) !important; }
        .compare-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; }
        .cmp-metric-btn { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; }
        .cmp-metric-btn.active { background:rgba(59,130,246,0.15); color:var(--blue); border-color:rgba(59,130,246,0.4); }
        .cmp-tab { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; }
        .cmp-tab.active { background:rgba(59,130,246,0.15); color:var(--blue); border-color:rgba(59,130,246,0.4); }
        .dev-btn { padding:4px 12px; border-radius:5px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.15s; }
        .dev-btn.active { background:rgba(6,182,212,0.15); color:var(--cyan); border-color:rgba(6,182,212,0.4); }
        .dev-btn:hover { border-color:var(--cyan); }

        /* Detail tabs */
        .detail-tabs { display: flex; gap: 4px; flex-wrap:wrap; }
        .detail-tab { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
        .detail-tab.active { background: rgba(59,130,246,0.15); color: var(--blue); border-color: rgba(59,130,246,0.4); }
        .detail-tab:hover { border-color: var(--blue); }

        .geo-bar-wrap { display: flex; align-items: center; gap: 6px; }
        .geo-bar { height: 6px; background: var(--blue); border-radius: 3px; min-width: 2px; transition: width 0.3s; }
        .tab-empty { padding: 40px; text-align: center; color: var(--muted); }
        .tab-loading { padding: 40px; text-align: center; color: var(--muted); }
        .device-pills { display:flex; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border); }
        .device-pill { flex:1; text-align:center; padding:12px; border-radius:8px; border:1px solid var(--border); }
        .device-pill-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
        .device-pill-val { font-size:20px; font-weight:700; }
        .device-pill-sub { font-size:10px; color:var(--muted); margin-top:2px; }
        .pos-badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; }
        .pos-1 { background:rgba(16,185,129,0.15); color:var(--green); }
        .pos-10 { background:rgba(59,130,246,0.15); color:var(--blue); }
        .pos-20 { background:rgba(245,158,11,0.15); color:var(--yellow); }
        .pos-bad { background:rgba(239,68,68,0.1); color:var(--muted); }

        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .warn-banner { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 12px; color: var(--yellow); display: flex; align-items: center; gap: 8px; }
        @media (max-width: 1200px) { .stats { grid-template-columns: repeat(3, 1fr); } .grid, .grid-wide { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } .header { flex-direction: column; gap: 12px; } }
    </style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div style="color:var(--muted)">Загрузка...</div></div></div>
<script>
const API = 'https://puxnigzdbscstvjlyvbg.supabase.co/rest/v1';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eG5pZ3pkYnNjc3R2amx5dmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzMxNDIsImV4cCI6MjA5MTMwOTE0Mn0.fxNYsN9ZlXIoJSbQdflKLSP7w-69TY4r8AP3biZsdmY';

let D = { sites: [], daily: [] };
let S = { sort: 'clicks', sortDir: -1, search: '', view: 'overview', selectedSite: null, selected: new Set(), statusFilter: '', compareMetric: 'clicks', compareTab: 'chart', compareDevice: '' };

// Detail filter state
let F = { preset: '', posMin: '', posMax: '', search: '', minClicks: '', minImpressions: '' };
let tabData = {}; // cache per tab
let detailVisible = { clicks: true, impressions: true, position: false, ctr: false };
let detailTab = 'overview';

// ─── API ────────────────────────────────────────────────────────────────────
const q = async (table, params='') => {
    try {
        const r = await fetch(`${API}/${table}?${params}`, { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } });
        return r.ok ? await r.json() : [];
    } catch(e) { console.error(e); return []; }
};

async function qAll(table, params='') {
    let all = [], offset = 0, batch = 1000;
    while (true) {
        const sep = params ? '&' : '';
        const data = await q(table, `${params}${sep}limit=${batch}&offset=${offset}`);
        all = all.concat(data);
        if (data.length < batch) break;
        offset += batch;
    }
    return all;
}

async function load() {
    const latestSites = await q('traffic_sites', 'select=date&order=date.desc&limit=1');
    const latestDate = latestSites?.[0]?.date;
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 60);
    const cutoffStr = cutoff.toISOString().split('T')[0];
    const sitesParams = latestDate ? `date=eq.${latestDate}&order=clicks.desc&limit=200` : 'order=clicks.desc&limit=200';
    const [sites, daily] = await Promise.all([
        q('traffic_sites', sitesParams),
        qAll('traffic_daily', `date=gte.${cutoffStr}&order=date.asc`)
    ]);
    D.sites = sites || [];
    D.daily = daily || [];
    const dates = [...new Set(D.daily.map(d => d.date))].sort();
    D.lastDate = dates[dates.length - 1];
    D.firstDate = dates[0];
    D.latestSiteDate = latestDate;
}

// ─── Helpers ────────────────────────────────────────────────────────────────
const shortUrl = u => u?.replace(/https?:\/\//, '').replace('sc-domain:', '').replace(/\/$/, '') || '';
const fmt = n => { if (n === null || n === undefined) return '—'; if (n >= 1e9) return (n/1e9).toFixed(1)+'B'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return Math.round(n).toLocaleString(); };
const fmtDate = d => { const dt = new Date(d); return `${dt.getDate()}.${String(dt.getMonth()+1).padStart(2,'0')}`; };

function posBadge(p) {
    const cls = p <= 3 ? 'pos-1' : p <= 10 ? 'pos-10' : p <= 20 ? 'pos-20' : 'pos-bad';
    return `<span class="pos-badge ${cls}">${p.toFixed(1)}</span>`;
}

function stats() {
    const clicks = D.sites.reduce((s, x) => s + (x.clicks || 0), 0);
    const impressions = D.sites.reduce((s, x) => s + (x.impressions || 0), 0);
    const avgPos = D.sites.length ? D.sites.reduce((s, x) => s + (x.position || 0), 0) / D.sites.length : 0;
    const avgCtr = D.sites.length ? D.sites.reduce((s, x) => s + (x.ctr || 0), 0) / D.sites.length : 0;
    const avgChg = D.sites.length ? D.sites.reduce((s, x) => s + (x.clicks_change || 0), 0) / D.sites.length : 0;
    return { clicks, impressions, avgPos, avgCtr, avgChg, count: D.sites.length };
}

function dailyTotals() {
    const byDate = {};
    D.daily.forEach(d => {
        if (!byDate[d.date]) byDate[d.date] = { date: d.date, clicks: 0, impressions: 0, position: 0, ctr: 0, n: 0 };
        byDate[d.date].clicks += d.clicks || 0;
        byDate[d.date].impressions += d.impressions || 0;
        byDate[d.date].position += d.position || 0;
        byDate[d.date].ctr += d.ctr || 0;
        byDate[d.date].n++;
    });
    return Object.values(byDate).map(d => ({ ...d, position: d.n ? d.position/d.n : 0, ctr: d.n ? d.ctr/d.n : 0 })).sort((a,b) => new Date(a.date)-new Date(b.date));
}

function siteDaily(url) { return D.daily.filter(d => d.site_url === url).sort((a,b) => new Date(a.date)-new Date(b.date)); }
function siteDailyShort(url) { return siteDaily(url).slice(-28); }
function status(s) { if ((s.clicks_change||0) < -30) return 'bad'; if ((s.clicks_change||0) < -10) return 'warn'; return 'good'; }
function isDataStale() { if (!D.lastDate) return false; return Math.floor((new Date()-new Date(D.lastDate))/(1000*60*60*24)) > 5; }
function staleDays() { if (!D.lastDate) return 0; return Math.floor((new Date()-new Date(D.lastDate))/(1000*60*60*24)); }

// ISO 3166-1 alpha-3 → flag emoji
function countryFlag(code) {
    if (!code) return '🌍';
    const map = {'USA':'US','GBR':'GB','RUS':'RU','DEU':'DE','FRA':'FR','CHN':'CN','JPN':'JP','IND':'IN','BRA':'BR','CAN':'CA','AUS':'AU','ITA':'IT','ESP':'ES','KOR':'KR','NLD':'NL','TUR':'TR','MEX':'MX','ARG':'AR','POL':'PL','UKR':'UA','IDN':'ID','THA':'TH','VNM':'VN','PHL':'PH','MYS':'MY','SGP':'SG','NGA':'NG','ZAF':'ZA','EGY':'EG','SAU':'SA','PAK':'PK','BGD':'BD','ISR':'IL','CHE':'CH','SWE':'SE','NOR':'NO','DNK':'DK','FIN':'FI','BEL':'BE','AUT':'AT','PRT':'PT','GRC':'GR','CZE':'CZ','HUN':'HU','ROU':'RO','BGR':'BG','HRV':'HR','SVK':'SK','SVN':'SI','KAZ':'KZ','BLR':'BY','UZB':'UZ','IRN':'IR','IRQ':'IQ','ARE':'AE','QAT':'QA','COL':'CO','CHL':'CL','PER':'PE','VEN':'VE','ECU':'EC','NZL':'NZ','HKG':'HK','TWN':'TW'};
    const iso2 = map[code.toUpperCase()];
    if (!iso2) return '🌍';
    return String.fromCodePoint(...[...iso2].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

// ─── Charts ─────────────────────────────────────────────────────────────────
let charts = {}, sparkCharts = [];
function destroyAllCharts() { Object.values(charts).forEach(c => { if(c) c.destroy(); }); charts = {}; sparkCharts.forEach(c => c.destroy()); sparkCharts = []; }
const chartDefaults = { responsive: true, maintainAspectRatio: false, interaction: { intersect: false, mode: 'index' }, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1e1e2e', padding: 12, titleFont: { size: 11 }, bodyFont: { size: 11 } } } };

function drawOverviewCharts() {
    const daily = dailyTotals();
    if (!daily.length) return;
    const labels = daily.map(d => fmtDate(d.date));
    charts.chartTraffic && charts.chartTraffic.destroy();
    const el = document.getElementById('chartTraffic');
    if (!el) return;
    charts.chartTraffic = new Chart(el, {
        type: 'line',
        data: { labels, datasets: [
            { label: 'Клики', data: daily.map(d => d.clicks), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 },
            { label: 'Показы', data: daily.map(d => d.impressions), borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,0.05)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0, yAxisID: 'y1' }
        ]},
        options: { ...chartDefaults, scales: { x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#6b7280',font:{size:10},maxTicksLimit:15} }, y: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#3b82f6',font:{size:10},callback:v=>fmt(v)} }, y1: { position:'right', grid:{drawOnChartArea:false}, ticks:{color:'#8b5cf6',font:{size:10},callback:v=>fmt(v)} } } }
    });
    const top = D.sites.slice(0, 8);
    if (top.length) {
        const el2 = document.getElementById('chartTop');
        if (!el2) return;
        charts.chartTop = new Chart(el2, {
            type: 'bar',

// ─── Filters ─────────────────────────────────────────────────────────────────
function applyFilters(data, searchKey = 'query') {
    let d = [...data];
    const posMin = parseFloat(F.posMin) || 0;
    const posMax = parseFloat(F.posMax) || 0;
    const minC = parseInt(F.minClicks) || 0;
    const minI = parseInt(F.minImpressions) || 0;
    if (F.preset === 'quickwin') d = d.filter(r => r.position >= 5 && r.position <= 20 && r.impressions >= 100);
    else if (F.preset === 'highpot') d = d.filter(r => r.impressions >= 1000 && (r.ctr||0) < 0.05);
    else if (F.preset === 'top3') d = d.filter(r => r.position <= 3);
    if (posMin > 0) d = d.filter(r => r.position >= posMin);
    if (posMax > 0) d = d.filter(r => r.position <= posMax);
    if (minC > 0) d = d.filter(r => r.clicks >= minC);
    if (minI > 0) d = d.filter(r => r.impressions >= minI);
    if (F.search) d = d.filter(r => (r[searchKey]||'').toLowerCase().includes(F.search.toLowerCase()));
    return d;
}

function setPreset(p) {
    F.preset = F.preset === p ? '' : p;
    refreshTab();
    document.querySelectorAll('.fp-preset').forEach(b => b.classList.toggle('active', b.dataset.preset === F.preset));
}

function resetFilters() {
    F = { preset:'', posMin:'', posMax:'', search:'', minClicks:'', minImpressions:'' };
    // Rerender filter panel
    const fp = document.getElementById('filter-panel');
    if (fp) fp.outerHTML = buildFilterPanel();
    refreshTab();
}

function refreshTab() {
    const t = detailTab;
    if (t === 'keywords' && tabData.keywords) renderKeywordsContent(tabData.keywords);
    else if (t === 'pages' && tabData.pages) renderPagesContent(tabData.pages);
    else if (t === 'geo' && tabData.geo) renderGeoContent(tabData.geo);
    else if (t === 'querypage' && tabData.querypage) renderQueryPageContent(tabData.querypage);
    else if (t === 'devices' && tabData.devices) renderDevicesContent(tabData.devices);
    updateFilterCount();
}

function updateFilterCount() {
    const el = document.getElementById('fp-count');
    if (el) { const active = [F.preset,F.posMin,F.posMax,F.search,F.minClicks,F.minImpressions].filter(Boolean).length; el.textContent = active ? `(${active} фильтр${active>1?'а':''})` : ''; }
}

function exportCSV(data, filename) {
    if (!data || !data.length) return;
    const keys = Object.keys(data[0]).filter(k => k !== 'id' && k !== 'site_url' && k !== 'created_at');
    const rows = [keys.join(','), ...data.map(r => keys.map(k => { const v = r[k]; return typeof v === 'string' && v.includes(',') ? `"${v}"` : v ?? ''; }).join(','))];
    const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

// ─── switchDetailTab ─────────────────────────────────────────────────────────
async function switchDetailTab(tab) {
    detailTab = tab;
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    const controls = document.getElementById('tab-controls');
    const content = document.getElementById('detail-tab-content');
    const fp = document.getElementById('filter-panel');
    if (fp) fp.style.display = 'flex'; // always show filter panel
    if (tab === 'overview') {
        if (controls) controls.style.display = 'flex';
        content.innerHTML = '<div style="height:400px"><canvas id="detailChart"></canvas></div>';
        setTimeout(() => drawDetailChart(S.selectedSite), 50);
    } else {
        if (controls) controls.style.display = 'none';
        if (tab === 'keywords') await loadKeywordsTab(S.selectedSite);
        else if (tab === 'pages') await loadPagesTab(S.selectedSite);
        else if (tab === 'devices') await loadDevicesTab(S.selectedSite);
        else if (tab === 'geo') await loadGeoTab(S.selectedSite);
        else if (tab === 'querypage') await loadQueryPageTab(S.selectedSite);
        updateFilterCount();
    }
}

// ─── Navigation ─────────────────────────────────────────────────────────────
function openSite(siteUrl) { S.view='detail'; S.selectedSite=siteUrl; tabData={}; F={preset:'',posMin:'',posMax:'',search:'',minClicks:'',minImpressions:''}; render(); }
function goBack() { S.view='overview'; S.selectedSite=null; render(); }
function setSort(col) { if(S.sort===col) S.sortDir*=-1; else{S.sort=col;S.sortDir=-1;} render(); }
function sortedSites() {
    let sites = [...D.sites];
    if (S.search) sites = sites.filter(s => shortUrl(s.site_url).toLowerCase().includes(S.search.toLowerCase()));
    if (S.statusFilter) sites = sites.filter(s => status(s) === S.statusFilter);
    sites.sort((a,b) => ((b[S.sort]||0)-(a[S.sort]||0))*S.sortDir);
    return sites;
}
function sortArrow(col) { if(S.sort!==col) return ''; return `<span class="sort-arrow">${S.sortDir===-1?'↓':'↑'}</span>`; }
function filterSites(val) { S.search=val; const ql=val.toLowerCase(); document.querySelectorAll('tr[data-url]').forEach(tr=>{tr.style.display=(!ql||tr.dataset.url.includes(ql))?'':'none';}); }
function setStatusFilter(f) { S.statusFilter=f; render(); }
function toggleSelect(url, e) {
    if (e) e.stopPropagation();
    if (S.selected.has(url)) S.selected.delete(url); else S.selected.add(url);

    if(bar){bar.classList.toggle('visible',S.selected.size>=2);const cnt=bar.querySelector('.cmp-count');if(cnt)cnt.textContent=S.selected.size;}
}

async function loadCommonKeywords() {
    const cc = document.getElementById('cmp-content');
    if (!cc) return;
    cc.innerHTML = '<div class="tab-loading">⏳ Загрузка ключевых слов...</div>';
    const selectedArr = [...S.selected];
    const kwBySite = await Promise.all(selectedArr.map(url =>
        q('traffic_keywords', `site_url=eq.${encodeURIComponent(url)}&date=eq.${D.lastDate}&order=impressions.desc&limit=1000`)
    ));
    const maps = kwBySite.map(kws => { const m = new Map(); kws.forEach(k => m.set(k.query, k)); return m; });
    const common = [...maps[0].keys()].filter(qr => maps.every(m => m.has(qr)));
    if (!common.length) { cc.innerHTML = '<div class="tab-empty">Нет общих ключевых слов для выбранных сайтов.</div>'; return; }
    const rows = common.map(qr => ({ query: qr, data: maps.map(m => m.get(qr)) }))
        .sort((a,b) => { const ai=a.data.reduce((s,d)=>s+(d?.impressions||0),0), bi=b.data.reduce((s,d)=>s+(d?.impressions||0),0); return bi-ai; });
    cc.innerHTML = `<div style="padding:10px 16px;font-size:12px;color:var(--muted)">Найдено ${common.length} общих запросов (показаны топ-300 по показам)</div>
        <div class="table-wrap" style="max-height:460px"><table>
            <thead><tr>
                <th>Запрос</th>
                <th style="text-align:right">Показы (σ)</th>
                ${selectedArr.map((url,i)=>`<th style="text-align:right;color:${CMP_COLORS[i]}">${shortUrl(url).substring(0,16)} Поз.</th><th style="text-align:right;color:${CMP_COLORS[i]}">CTR</th>`).join('')}
            </tr></thead>
            <tbody>${rows.slice(0,300).map(r=>`<tr>
                <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.query}</td>
                <td class="mono" style="text-align:right">${fmt(r.data.reduce((s,d)=>s+(d?.impressions||0),0))}</td>
                ${r.data.map(d=>`<td class="mono" style="text-align:right">${d?posBadge(d.position):'—'}</td><td class="mono" style="text-align:right;color:var(--muted)">${d?((d.ctr||0)*100).toFixed(1)+'%':'—'}</td>`).join('')}
            </tr>`).join('')}</tbody>
        </table></div>`;
}

async function drawCompareChart() {
    if (charts.compareChart) { charts.compareChart.destroy(); delete charts.compareChart; }
    const canvas = document.getElementById('compareChart');
    if (!canvas) return;
    const selectedArr = [...S.selected];
    const allDates = [...new Set(D.daily.map(d => d.date))].sort();
    const dates = allDates.slice(-35);
    const labels = dates.map(d => fmtDate(d));
    const metric = S.compareMetric;
    const isCtr = metric === 'ctr';
    let datasets;
    if (S.compareDevice) {
        const cutoff = dates[0];
        const deviceData = await Promise.all(selectedArr.map(url =>
            q('traffic_daily_device', `site_url=eq.${encodeURIComponent(url)}&device=eq.${S.compareDevice}&date=gte.${cutoff}&order=date.asc&limit=50`)
        ));
        datasets = selectedArr.map((url,i) => {
            const dm = {}; (deviceData[i]||[]).forEach(d => dm[d.date]=d);
            return { label: shortUrl(url), data: dates.map(d=>{const r=dm[d]; return r?(isCtr?+(r[metric]*100).toFixed(2):r[metric]):null;}), borderColor:CMP_COLORS[i], backgroundColor:CMP_COLORS[i]+'18', fill:false, tension:0.4, borderWidth:2, pointRadius:0, pointHoverRadius:4, spanGaps:true };
        });
    } else {
        datasets = selectedArr.map((url,i) => {
            const dm = {}; D.daily.filter(d=>d.site_url===url).forEach(d=>dm[d.date]=d);
            return { label: shortUrl(url), data: dates.map(d=>{const r=dm[d]; return r?(isCtr?+(r[metric]*100).toFixed(2):r[metric]):null;}), borderColor:CMP_COLORS[i], backgroundColor:CMP_COLORS[i]+'18', fill:false, tension:0.4, borderWidth:2, pointRadius:0, pointHoverRadius:4, spanGaps:true };
        });
    }
    const yReverse = metric === 'position';
    const isPct = isCtr;
    charts.compareChart = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive:true, maintainAspectRatio:false, animation:false,
            interaction:{mode:'index',intersect:false},
            plugins:{legend:{display:true,position:'top',labels:{color:'#9ca3af',boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${isPct?ctx.parsed.y+'%':fmt(ctx.parsed.y)}`}}},
            scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b7280',font:{size:10},maxTicksLimit:12}},y:{reverse:yReverse,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#9ca3af',font:{size:10},callback:v=>isPct?v+'%':fmt(v)}}}
        }
    });
}

                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header"><div class="panel-title">🏆 Топ-8 по кликам</div></div>
                    <div class="panel-body"><div class="chart-box sm"><canvas id="chartTop"></canvas></div></div>
                </div>
            </div>
        </main>
        <div id="compare-bar" class="compare-bar ${S.selected.size>=2?'visible':''}">
            <span style="color:var(--text);font-size:13px">Выбрано: <b class="cmp-count">${S.selected.size}</b> сайт(а)</span>
            <button class="compare-bar-btn primary" onclick="openComparison()">📊 Сравнить</button>
            <button class="compare-bar-btn secondary" onclick="clearSelection()">✕ Сбросить</button>
        </div>`;

    setTimeout(() => {
        drawOverviewCharts();
        sites.forEach((s,i) => { const c=document.getElementById(`spark${i}`); const data=siteDailyShort(s.site_url); if(c&&data.length>1) drawSparkline(c,data); });
    }, 50);
}

load().then(render);
</script>
</body>
</html>
